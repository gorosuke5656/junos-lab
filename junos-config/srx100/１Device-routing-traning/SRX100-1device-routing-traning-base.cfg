policy-options {
    policy-statement from_VR1 {
        term term1 {
            from instance VR1;
            then accept;
        }
    }
    policy-statement from_VR2 {
        term term1 {
            from instance VR2;
            then accept;
        }
    }
    policy-statement from_VR3 {
        term term1 {
            from instance VR3;
            then accept;
        }
    }
}
security {
    screen {
        ids-option untrust-screen {
            icmp {
                ping-death;
            }
            ip {
                source-route-option;
                tear-drop;
            }
            tcp {
                syn-flood {
                    alarm-threshold 1024;
                    attack-threshold 200;
                    source-threshold 1024;
                    destination-threshold 2048;
                    timeout 20;
                }
                land;
            }
        }
    }
    zones {
        security-zone trust {
            host-inbound-traffic {
                system-services {
                    all;
                }
                protocols {
                    all;
                }
            }
            interfaces {
                all;
            }
        }
    }
    policies {
        default-policy {
            permit-all;
        }
    }
}
routing-instances {
    VR1 {
        instance-type virtual-router;
        interface fe-0/0/0.30;
